<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Kids Learning PRO MAX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#eef3fb}

.header{
    background:linear-gradient(135deg,#3f51b5,#7b2ff7);
    color:white;
    text-align:center;
    padding:18px;
}

.container{max-width:520px;margin:auto;padding:15px}

.card{
    background:white;
    padding:15px;
    margin:12px 0;
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.btn{
    background:#28a745;
    color:white;
    padding:12px;
    border:none;
    border-radius:10px;
    width:100%;
    margin-top:10px;
    cursor:pointer;
}

.progress{
    background:#ddd;
    height:12px;
    border-radius:20px;
    overflow:hidden;
}

.bar{
    height:12px;
    width:0%;
    background:linear-gradient(90deg,#00c853,#64dd17);
}

.page{display:none;}
.active{display:block;}

.level{
    background:white;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    cursor:pointer;
}

.locked{opacity:0.5}

.badge{
    background:#ff5722;
    color:white;
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="header">📚 Kids Learning PRO MAX 🎮</div>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">

<div class="card">

<h3 id="welcome">👋 مرحبًا</h3>

<input id="nameInput" placeholder="اكتب اسمك"
style="padding:10px;border-radius:10px;border:1px solid #ccc;width:100%;margin-top:10px;">

<button class="btn" onclick="saveName()">ابدأ</button>

<div class="progress" style="margin-top:10px;">
<div id="bar" class="bar"></div>
</div>

<p id="info">🔥 XP: 0 | 🎓 Level: 1</p>

</div>

<div class="card">

<div class="level" onclick="openLesson('kg')">
👶 الدرس الأول <span class="badge">XP +25</span>
</div>

</div>

<button id="rewardBtn" class="btn" style="background:#ff5722;display:none;" onclick="openReward()">
🎁 فتح المكافأة
</button>

</div>

<!-- LESSON -->
<div id="lesson" class="page">

<div class="card">

<h3>درس: الحروف</h3>

<iframe width="100%" height="220" src="https://www.youtube.com/embed/tgbNymZ7vqY"></iframe>

<button class="btn" onclick="completeLesson()">✔ إكمال الدرس</button>
<button class="btn" style="background:#555" onclick="back()">⬅ رجوع</button>

</div>

</div>

</div>

<script>

let xp = 0;
let lessons = 0;
let user = "";

/* 🔥 حماية الدخول */
window.onload = function(){

    if(localStorage.getItem("fromLanding") !== "yes"){
        window.location.href =
        "https://progalkhatib-debug.github.io/al-khatib-academy-pro/landing.html";
        return;
    }

    xp = parseInt(localStorage.getItem("xp") || 0);
    lessons = parseInt(localStorage.getItem("lessons") || 0);
    user = localStorage.getItem("user") || "";

    if(user){
        document.getElementById("welcome").innerText = "👋 مرحبًا " + user;
    }

    update();
    checkRewards();
}

/* اسم المستخدم */
function saveName(){
    let n = document.getElementById("nameInput").value.trim();
    if(!n) return;

    user = n;
    localStorage.setItem("user", n);

    document.getElementById("welcome").innerText = "👋 مرحبًا " + n;
}

/* فتح درس */
function openLesson(){
    document.getElementById("home").classList.remove("active");
    document.getElementById("lesson").classList.add("active");
}

/* إكمال درس */
function completeLesson(){

    xp += 25;
    lessons += 1;

    localStorage.setItem("xp", xp);
    localStorage.setItem("lessons", lessons);

    update();
    checkRewards();

    alert("🎉 ممتاز! حصلت على XP");
}

/* تحديث */
function update(){

    document.getElementById("info").innerText =
    "🔥 XP: " + xp + " | 🎓 Level: " + Math.floor(xp/50 + 1);

    document.getElementById("bar").style.width = Math.min(xp,100) + "%";
}

/* مكافأة */
function checkRewards(){
    if(lessons >= 2){
        document.getElementById("rewardBtn").style.display = "block";
    }
}

/* CPA OFFER */
function openReward(){

    if(lessons < 2){
        alert("أكمل درسين أولاً");
        return;
    }

    localStorage.setItem("reward","yes");

    window.location.href =
    "https://singingfiles.com/show.php?u=2514927&id=YOUR_OFFER";
}

/* رجوع */
function back(){
    document.getElementById("lesson").classList.remove("active");
    document.getElementById("home").classList.add("active");
}

</script>

</body>
</html>
