<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>📚 منصة تعليم الأطفال</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f7fb;
    text-align:center;
    padding:30px;
}

.box{
    max-width:850px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h1{
    color:#222;
}

p{
    color:#444;
    line-height:1.7;
}

.btn{
    padding:16px 28px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    margin-top:12px;
}

.primary{
    background:#ff5722;
    color:white;
}

.secondary{
    background:#28a745;
    color:white;
    display:inline-block;
    text-decoration:none;
}

.badge{
    background:#eef6ff;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="box">

<h1>📚 منصة تعليم الأطفال الذكية</h1>

<p>
👩‍👦 ساعدي طفلك على تعلم الحروف والأرقام بطريقة سهلة وبسيطة  
بدون ضغط أو طرق تقليدية مملة.
</p>

<div class="badge">✔ مناسب للأطفال من 4 إلى 14 سنة</div>
<div class="badge">✔ محتوى تعليمي مبسط وسهل</div>
<div class="badge">✔ تم استخدامه من آلاف أولياء الأمور</div>

<p style="color:#ff5722;font-weight:bold;">
ابدئي الآن ووفّري لطفلك بداية تعليم قوية
</p>

<!-- زر رئيسي -->
<button class="btn primary" onclick="goPrelander()">
🎁 ابدئي الآن مجانًا
</button>

<br>

<!-- دخول مباشر -->
<a href="https://progalkhatib-debug.github.io/al-khatib-academy-pro/index.html"
class="btn secondary">
🚀 دخول مباشر
</a>

</div>

<script>

/* 🚀 تتبع + تحويل */
function goPrelander(){

    // تسجيل مصدر الدخول
    let landing = localStorage.getItem("landingCount") || 0;
    localStorage.setItem("landingCount", Number(landing) + 1);

    localStorage.setItem("source","landing");

    // تحويل للـ prelander
    window.location.href = "prelander.html";
}

</script>
<script>
new Image().src = "https://script.google.com/macros/s/AKfycbzrGOrO1rxU5S-HmSU2YkkQ1skumK4REEnDgcTKXyxLXFPG5p_yWViP-_tudebMGchJ/exec?source=landing";
</script>
</body>
</html>
