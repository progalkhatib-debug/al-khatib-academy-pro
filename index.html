<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Kids Learning PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#eef3fb;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#3f51b5,#7b2ff7);
    color:white;
    text-align:center;
    padding:18px;
    font-size:18px;
}

/* CONTAINER */
.container{
    max-width:520px;
    margin:auto;
    padding:15px;
}

/* CARD */
.card{
    background:white;
    padding:15px;
    margin:12px 0;
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

/* BUTTON */
.btn{
    background:#28a745;
    color:white;
    padding:12px;
    border:none;
    border-radius:10px;
    width:100%;
    margin-top:10px;
    font-size:15px;
    cursor:pointer;
}

/* LEVEL */
.level{
    background:white;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
}

/* LOCKED */
.locked{
    opacity:0.5;
}

/* BADGE */
.badge{
    background:#ff5722;
    color:white;
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
}

/* PROGRESS */
.progress{
    background:#ddd;
    height:12px;
    border-radius:20px;
    overflow:hidden;
}
.bar{
    height:12px;
    width:0%;
    background:linear-gradient(90deg,#00c853,#64dd17);
}

/* PAGES */
.page{display:none;}
.active{display:block;}

/* BADGES */
.smallBadge{
    display:inline-block;
    background:#673ab7;
    color:white;
    padding:5px 10px;
    border-radius:12px;
    margin:3px;
    font-size:12px;
}

/* 🔥 AD BOX */
.adbox{
    background:#fff3cd;
    padding:12px;
    border-radius:12px;
    text-align:center;
    margin:10px 0;
    font-size:13px;
}

/* ANIMATION */
.pop{animation:pop 0.3s ease;}
@keyframes pop{
    0%{transform:scale(0.8);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="header">
📚 Kids Learning PRO 🎮
</div>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">

<div class="card">

<h3 id="welcome">👋 مرحبًا</h3>

<input id="nameInput" placeholder="اكتب اسمك"
style="padding:10px;border-radius:10px;border:1px solid #ccc;width:100%;margin-top:10px;">

<button class="btn" onclick="saveName()">ابدأ</button>

<div class="progress" style="margin-top:10px;">
<div id="bar" class="bar"></div>
</div>

<p id="score">🔥 لديك 25 نقطة كبداية!</p>

</div>

<!-- 🔥 ربح داخل الصفحة -->
<div class="adbox">
🎁 مكافأة مجانية للأطفال متاحة الآن  
<button class="btn" style="background:#ff5722" onclick="openReward()">
🎁 فتح المكافأة
</button>
</div>

<div class="card">
<h3>🏆 شاراتك</h3>
<div id="badges"></div>
</div>

<div class="card">

<div class="level" onclick="openLesson('kg')">
👶 الحضانة <span class="badge">مفتوح</span>
</div>

<div id="level2" class="level locked">
📘 ابتدائي <span class="badge">مغلق</span>
</div>

<div id="level3" class="level locked">
📗 إعدادي <span class="badge">مغلق</span>
</div>

</div>

</div>

<!-- LESSON -->
<div id="lesson" class="page">

<div class="card">

<h3 id="title"></h3>

<iframe id="video" width="100%" height="220" style="border-radius:12px;"></iframe>

<p id="lessonText"></p>

<button class="btn" onclick="complete()">
✔ إنهاء الدرس
</button>

<button class="btn" style="background:#555" onclick="back()">
⬅ رجوع
</button>

</div>

</div>

</div>

<script>

let score = 25;
let user = "";

/* LOAD */
window.onload = function(){

    let s = localStorage.getItem("score");
    let u = localStorage.getItem("user");

    if(s !== null) score = parseInt(s);

    if(u !== null){
        user = u;
        document.getElementById("welcome").innerText = "👋 مرحبًا " + user;
    }

    update();

    let b = JSON.parse(localStorage.getItem("badges") || "[]");
    b.forEach(addBadge);

    unlockLevels();
}

/* SAVE NAME */
function saveName(){
    let n = document.getElementById("nameInput").value.trim();

    if(!n) return;

    user = n;
    localStorage.setItem("user", n);

    document.getElementById("welcome").innerText = "👋 مرحبًا " + n;
}

/* OPEN LESSON */
function openLesson(id){

    document.getElementById("home").classList.remove("active");
    document.getElementById("lesson").classList.add("active");

    if(id === "kg"){
        set("الحروف للأطفال","https://www.youtube.com/embed/tgbNymZ7vqY","تعلم الحروف بسهولة");
    }

    if(id === "primary"){
        set("الأرقام","https://www.youtube.com/embed/5MgBikgcWnY","تعلم الأرقام من 1 إلى 10");
    }
}

/* SET */
function set(t,v,txt){
    document.getElementById("title").innerText = t;
    document.getElementById("video").src = v;
    document.getElementById("lessonText").innerText = txt;
}

/* COMPLETE */
function complete(){

    score += 25;
    localStorage.setItem("score", score);

    update();
    unlockLevels();

    // 🟢 تشغيل المكافأة عند الوصول لـ 50+
    if(score >= 50){
        setTimeout(() => {
            openReward();
        }, 1000);
    }
}


/* 🔥 CPA REWARD - تحسين التحويل */
function openReward(){

    // منع تكرار الفتح أكثر من مرة
    if(localStorage.getItem("rewardOpened") === "yes"){
        return;
    }

    localStorage.setItem("rewardOpened", "yes");

    // رسالة ثقة للمستخدم
    alert("🎁 جاري تجهيز المكافأة التعليمية المجانية...");

    // تأخير بسيط لرفع التحويل
    setTimeout(() => {

        window.location.href = "https://singingfiles.com/show.php?l=0&u=2514927&id=74324";

    }, 2000);
}


/* UPDATE - بدون تغيير لكن تحسين بسيط */
function update(){

    document.getElementById("score").innerText = "🔥 نقاطك: " + score;

    let p = Math.min(score,100);

    document.getElementById("bar").style.width = p + "%";

}


/* UNLOCK */
function unlockLevels(){
    if(score >= 50){
        document.getElementById("level2").classList.remove("locked");
    }
    if(score >= 100){
        document.getElementById("level3").classList.remove("locked");
    }
}
/* BACK */
function back(){
    document.getElementById("lesson").classList.remove("active");
    document.getElementById("home").classList.add("active");
}

</script>

</body>
</html>
