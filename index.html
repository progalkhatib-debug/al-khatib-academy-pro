<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Kids Learning PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#eef3fb;
}

.header{
    background:linear-gradient(135deg,#3f51b5,#7b2ff7);
    color:white;
    text-align:center;
    padding:18px;
    font-size:18px;
}

.container{
    max-width:520px;
    margin:auto;
    padding:15px;
}

.card{
    background:white;
    padding:15px;
    margin:12px 0;
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.btn{
    background:#28a745;
    color:white;
    padding:12px;
    border:none;
    border-radius:10px;
    width:100%;
    margin-top:10px;
    font-size:15px;
    cursor:pointer;
}

.level{
    background:white;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
}

.locked{opacity:0.5;}

.badge{
    background:#ff5722;
    color:white;
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
}

.progress{
    background:#ddd;
    height:12px;
    border-radius:20px;
    overflow:hidden;
}

.bar{
    height:12px;
    width:0%;
    background:linear-gradient(90deg,#00c853,#64dd17);
}

.page{display:none;}
.active{display:block;}

.smallBadge{
    display:inline-block;
    background:#673ab7;
    color:white;
    padding:5px 10px;
    border-radius:12px;
    margin:3px;
    font-size:12px;
}

.adbox{
    background:#fff3cd;
    padding:12px;
    border-radius:12px;
    text-align:center;
    margin:10px 0;
    font-size:13px;
}
</style>
</head>

<body>

<div class="header">📚 Kids Learning PRO 🎮</div>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">

<div class="card">

<h3 id="welcome">👋 مرحبًا</h3>

<input id="nameInput" placeholder="اكتب اسمك"
style="padding:10px;border-radius:10px;border:1px solid #ccc;width:100%;margin-top:10px;">

<button class="btn" onclick="saveName()">ابدأ</button>

<div class="progress" style="margin-top:10px;">
<div id="bar" class="bar"></div>
</div>

<p id="score">🔥 النقاط: 0</p>
<p id="level">⭐ المستوى: 1</p>

</div>

<div class="card">
<h3>🏆 الشارات</h3>
<div id="badges"></div>
</div>

<div class="card">

<div class="level" onclick="openLesson('kg')">
👶 الحضانة <span class="badge">مفتوح</span>
</div>

<div id="level2" class="level locked">
📘 ابتدائي <span class="badge">مغلق</span>
</div>

<div id="level3" class="level locked">
📗 إعدادي <span class="badge">مغلق</span>
</div>

</div>

</div>

<!-- LESSON -->
<div id="lesson" class="page">

<div class="card">

<h3 id="title"></h3>

<iframe id="video" width="100%" height="220" style="border-radius:12px;"></iframe>

<p id="lessonText"></p>

<button class="btn" onclick="complete()">
✔ إنهاء الدرس
</button>

<button class="btn" style="background:#555" onclick="back()">
⬅ رجوع
</button>

</div>

</div>

</div>

<script>

let score = 0;
let level = 1;
let user = "";

/* LOAD */
window.onload = function(){

    score = parseInt(localStorage.getItem("score") || 0);
    level = parseInt(localStorage.getItem("level") || 1);
    user = localStorage.getItem("user") || "";

    if(user){
        document.getElementById("welcome").innerText = "👋 مرحبًا " + user;
    }

    update();
    unlockLevels();
}

/* SAVE NAME */
function saveName(){
    let n = document.getElementById("nameInput").value.trim();
    if(!n) return;

    user = n;
    localStorage.setItem("user", n);

    document.getElementById("welcome").innerText = "👋 مرحبًا " + n;
}

/* OPEN LESSON */
function openLesson(id){

    document.getElementById("home").classList.remove("active");
    document.getElementById("lesson").classList.add("active");

    if(id === "kg"){
        set("الحروف للأطفال",
        "https://www.youtube.com/embed/tgbNymZ7vqY",
        "تعلم الحروف بطريقة سهلة");
    }
}

/* SET */
function set(t,v,txt){
    document.getElementById("title").innerText = t;
    document.getElementById("video").src = v;
    document.getElementById("lessonText").innerText = txt;
}

/* COMPLETE LESSON */
function complete(){

    score += 25;
    localStorage.setItem("score", score);

    checkLevelUp();
    update();
    unlockLevels();

    alert("🎉 ممتاز! أتممت الدرس");
}

/* LEVEL SYSTEM */
function checkLevelUp(){

    if(score >= 50 && level < 2){
        level = 2;
        alert("🎉 مبروك! وصلت للمستوى 2");
    }

    if(score >= 100 && level < 3){
        level = 3;
        alert("🏆 مبروك! وصلت للمستوى 3");
    }

    localStorage.setItem("level", level);
}

/* UPDATE UI */
function update(){

    document.getElementById("score").innerText = "🔥 النقاط: " + score;
    document.getElementById("level").innerText = "⭐ المستوى: " + level;

    let p = Math.min(score,100);
    document.getElementById("bar").style.width = p + "%";
}

/* UNLOCK LEVELS */
function unlockLevels(){

    if(score >= 50){
        document.getElementById("level2").classList.remove("locked");
    }

    if(score >= 100){
        document.getElementById("level3").classList.remove("locked");
    }
}

/* BACK */
function back(){
    document.getElementById("lesson").classList.remove("active");
    document.getElementById("home").classList.add("active");
}

</script>

</body>
</html>
