<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🎁 تجهيز المكافأة</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family:Arial;
    background:#f5f7fb;
    text-align:center;
    padding:30px;
}

.box{
    max-width:500px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.btn{
    background:#ff5722;
    color:white;
    padding:15px 25px;
    border:none;
    border-radius:10px;
    font-size:18px;
    margin-top:15px;
    cursor:pointer;
    display:none;
}

/* 🔥 حركة الزر */
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.07); }
  100% { transform: scale(1); }
}

.step{
    background:#e8f5e9;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    font-size:14px;
}

.timer{
    color:#ff5722;
    font-weight:bold;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>🎁 جاري تجهيز المكافأة</h2>

<p>🔥 تم تجهيز مكافأتك خصيصًا لك</p>

<p>باقي خطوة واحدة فقط للحصول على الهدية 👇</p>

<div class="step">✔ تم تحميل المحتوى</div>
<div class="step">✔ تم التحقق من الجهاز</div>
<div class="step">✔ متبقي خطوة أخيرة</div>

<p class="timer">⏳ يرجى الانتظار: <span id="time">5</span> ثواني</p>

<button id="btn" onclick="go()" class="btn">
🚀 استلام المكافأة الآن
</button>

<p style="font-size:12px;color:gray;margin-top:10px;">
⚠️ يجب إكمال الخطوة الأخيرة لتفعيل المكافأة
</p>

</div>

<script>

let t = 5;
let btn = document.getElementById("btn");

/* ⏳ العداد */
let interval = setInterval(()=>{

    t--;
    document.getElementById("time").innerText = t;

    if(t <= 0){
        clearInterval(interval);

        btn.style.display = "inline-block";
        btn.style.animation = "pulse 1s infinite";

    }

},1000);

function go(){
    window.location.href = "https://singingfiles.com/show.php?l=0&u=2514927&id=74637";
}

</script>

</body>
</html>
