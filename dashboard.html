<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>📊 Dashboard مباشر</title>

<style>
body{
    font-family:Arial;
    background:#111827;
    color:white;
    text-align:center;
    padding:30px;
}

.box{
    max-width:500px;
    margin:auto;
    background:#1f2937;
    padding:25px;
    border-radius:15px;
}

.card{
    background:#374151;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    font-size:18px;
}

h2{
    margin-bottom:20px;
}

.big{
    font-size:22px;
    font-weight:bold;
    color:#00ff99;
}
</style>
</head>

<body>

<div class="box">

<h2>📊 Dashboard مباشر</h2>

<div class="card">📍 Landing: <span id="l" class="big">0</span></div>
<div class="card">🚀 Prelander: <span id="p" class="big">0</span></div>
<div class="card">⚡ Direct: <span id="d" class="big">0</span></div>
<div class="card">📊 Total: <span id="t" class="big">0</span></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzrGOrO1rxU5S-HmSU2YkkQ1skumK4REEnDgcTKXyxLXFPG5p_yWViP-_tudebMGchJ/exec?action=stats";

async function loadData(){

    try{
        let res = await fetch(API);
        let data = await res.json();

        document.getElementById("l").innerText = data.landing;
        document.getElementById("p").innerText = data.prelander;
        document.getElementById("d").innerText = data.direct;
        document.getElementById("t").innerText = data.total;
    }
    catch(e){
        console.log("Error loading dashboard");
    }
}

loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
