<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>📚 منصة التعليم الذكية للأطفال</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    direction:rtl;
    background:linear-gradient(135deg,#eef2ff,#f5f7fb);
    text-align:center;
    padding:30px;
}

.box{
    max-width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

button,a{
    cursor:pointer;
}

h1{margin-bottom:10px;}
p{color:#444;line-height:1.6;}
</style>
</head>

<body>

<div class="box">

<h1>📚 منصة التعليم الذكية للأطفال</h1>

<p>🎮 تعلم بطريقة الألعاب + فيديوهات + مستويات + شارات</p>

<h3>⚡ أكثر من 10,000 طفل بدأوا التعلم</h3>

<p style="color:#ff5722;font-weight:bold;">
🚀 ابدأ الآن مجانًا
</p>

<!-- زر البداية -->
<button onclick="startLearning()"
style="padding:18px 30px;background:#ff5722;color:white;border:none;border-radius:12px;font-size:18px;">
🎁 ابدأ الرحلة التعليمية
</button>

<br><br>

<!-- دخول مباشر -->
<a href="https://progalkhatib-debug.github.io/al-khatib-academy-pro/"
onclick="setFlag()"
style="display:inline-block;background:#28a745;color:white;padding:14px 20px;border-radius:10px;text-decoration:none;">
🚀 دخول مباشر للمنصة
</a>

<p id="status" style="margin-top:15px;color:#666;"></p>

</div>

<script>

/* تثبيت الدخول من الصفحة */
function setFlag(){
    localStorage.setItem("fromLanding","yes");
}

/* بدء التجربة */
function startLearning(){

    localStorage.setItem("fromLanding","yes");

    document.getElementById("status").innerText = "🎯 جاري تجهيز التجربة التعليمية...";

    setTimeout(()=>{
        window.location.href =
        "https://progalkhatib-debug.github.io/al-khatib-academy-pro/";
    },1200);
}

/* حماية إضافية (اختياري لكن مهم) */
window.onload = function(){
    localStorage.setItem("fromLanding","yes");
}

</script>

</body>
</html>
