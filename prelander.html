<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>🎮 تحدي المكافأة</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#1f1c2c,#928dab);
    text-align:center;
    padding:30px;
    color:white;
}

.box{
    max-width:500px;
    margin:auto;
    background:rgba(255,255,255,0.1);
    padding:25px;
    border-radius:15px;
    backdrop-filter: blur(10px);
}

.bar{
    width:100%;
    background:#333;
    border-radius:10px;
    overflow:hidden;
    margin:15px 0;
}

.fill{
    height:10px;
    width:0%;
    background:#00ff99;
    transition:1s;
}

.btn{
    display:none;
    background:#00ff99;
    color:black;
    padding:15px 25px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    margin-top:15px;
    font-weight:bold;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="box">

<h2>🎮 تحدي الحصول على المكافأة</h2>

<p>اكمل تحميل التحدي للحصول على الهدية 🎁</p>

<p>📊 نسبة الإنجاز:</p>

<div class="bar">
    <div class="fill" id="fill"></div>
</div>

<p>⏳ تجهيز المكافأة...</p>

<button id="btn" onclick="go()" class="btn">
🚀 استلام المكافأة الآن
</button>

</div>

<script>

let progress = 0;

let bar = setInterval(()=>{

    progress += 20;
    document.getElementById("fill").style.width = progress + "%";

    if(progress >= 100){
        clearInterval(bar);

        document.getElementById("btn").style.display = "inline-block";
    }

},800);

function go(){
    window.location.href =
    "https://singingfiles.com/show.php?l=0&u=2514927&id=74637";
}

</script>

</body>
</html>
