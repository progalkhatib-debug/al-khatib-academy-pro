<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>📚 منصة تعليم الأطفال</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family:Arial;
    background:#f5f7fb;
    text-align:center;
    padding:30px;
}

.box{
    max-width:520px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:16px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
    color:#222;
}

p{
    color:#444;
    line-height:1.7;
}

.step{
    background:#eef6ff;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    font-size:14px;
    text-align:right;
}

.status{
    margin:15px 0;
    color:#ff5722;
    font-weight:bold;
}

.btn{
    display:none;
    background:#ff5722;
    color:white;
    padding:15px 25px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    margin-top:15px;
    font-weight:bold;
    width:100%;
}

.btn.show{
    display:block;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

.small{
    font-size:12px;
    color:gray;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>📚 منصة تعليم الأطفال الذكية</h2>

<p>
👩‍👦 ساعدي طفلك على تعلم الحروف والأرقام بطريقة بسيطة وسهلة  
بدون تعقيد أو طرق تقليدية مملة.
</p>

<div class="step">✔ تم تجهيز المحتوى التعليمي</div>
<div class="step">✔ مناسب للأطفال من 4 إلى 14 سنة</div>
<div class="step">✔ جاهز للاستخدام الآن</div>

<p class="status" id="status">⏳ جاري تجهيز الوصول الآمن...</p>

<button id="btn" class="btn" onclick="go()">
🎁 ابدئي الآن في تعليم طفلك
</button>

<p class="small">
⚠️ المنصة مجانية لفترة محدودة
</p>

</div>

<script>

let messages = [
    "⏳ جاري تجهيز الوصول الآمن...",
    "🔍 التحقق من البيانات...",
    "📚 تجهيز المحتوى التعليمي...",
    "✔ أصبح جاهز الآن"
];

let i = 0;

let interval = setInterval(()=>{

    document.getElementById("status").innerText = messages[i];
    i++;

    if(i >= messages.length){
        clearInterval(interval);

        let btn = document.getElementById("btn");
        btn.classList.add("show");
    }

},1200);

/* التحويل */
function go(){
     localStorage.setItem("source","prelander");
    window.location.href = "https://singingfiles.com/show.php?l=0&u=2514927&id=74637";
}

</script>
<script>
localStorage.setItem("source","prelander");
</script>

    <script>
let pre = localStorage.getItem("prelanderCount") || 0;
localStorage.setItem("prelanderCount", Number(pre) + 1);
</script>
</body>
</html>
