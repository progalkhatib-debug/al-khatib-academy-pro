<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Kids Learning PRO MAX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#eef3fb}

.header{
    background:linear-gradient(135deg,#3f51b5,#7b2ff7);
    color:white;
    text-align:center;
    padding:18px;
}

.container{max-width:520px;margin:auto;padding:15px}

.card{
    background:white;
    padding:15px;
    margin:12px 0;
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.btn{
    background:#28a745;
    color:white;
    padding:12px;
    border:none;
    border-radius:10px;
    width:100%;
    margin-top:10px;
    cursor:pointer;
}

.progress{
    background:#ddd;
    height:12px;
    border-radius:20px;
    overflow:hidden;
}

.bar{
    height:12px;
    width:0%;
    background:linear-gradient(90deg,#00c853,#64dd17);
}

.page{display:none;}
.active{display:block;}

.level{
    background:white;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    cursor:pointer;
}

.locked{
    opacity:0.5;
    pointer-events:none;
}

.badge{
    background:#ff5722;
    color:white;
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
}

/* ⭐ النجوم */
.stars{
    text-align:center;
    font-size:22px;
    margin-top:10px;
    color:gold;
}

/* 👦 شخصية */
.character{
    text-align:center;
    font-size:14px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">📚 Kids Learning PRO MAX 🎮</div>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">

<div class="card">

<h3 id="welcome">👋 مرحبًا</h3>

<input id="nameInput" placeholder="اكتب اسمك"
style="padding:10px;border-radius:10px;border:1px solid #ccc;width:100%;margin-top:10px;">

<button class="btn" onclick="saveName()">ابدأ</button>

<div class="progress" style="margin-top:10px;">
<div id="bar" class="bar"></div>
</div>

<p id="info">🔥 XP: 0 | 🎓 Level: 1</p>

</div>

<div class="card" id="levelsContainer"></div>

<button id="rewardBtn" class="btn" style="background:#ff5722;display:none;" onclick="openReward()">
🎁 فتح المكافأة
</button>

<button id="certificateBtn" class="btn" style="background:#3f51b5;display:none;" onclick="downloadCertificate()">
📄 تحميل الشهادة
</button>

</div>

<!-- LESSON -->
<div id="lesson" class="page">

<div class="card">

<!-- 👦 شخصية كرتونية -->
<div class="character">
<img src="https://cdn-icons-png.flaticon.com/512/1995/1995574.png" width="80">
<p>👦 هيا بنا نتعلم!</p>
</div>

<h3 id="lessonTitle">درس</h3>

<!-- صورة الدرس -->
<img id="lessonImage" src="" style="width:100%;border-radius:12px;margin-bottom:10px;">

<!-- فيديو -->
<video id="videoPlayer" width="100%" controls style="border-radius:12px;">
    <source src="" type="video/mp4">
</video>

<!-- ⭐ النجوم -->
<div id="stars" class="stars"></div>

<button class="btn" onclick="completeLesson()">✔ إكمال الدرس</button>
<button class="btn" style="background:#555" onclick="back()">⬅ رجوع</button>

</div>

</div>

</div>

<audio id="successSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>

let xp = 0;
let lessons = 0;
let user = "";

/* الدروس مع صور */
const lessonsData = {
    kg: [
        {title: "الحروف", video: "videos/letters.mp4", img: "images/letters.png"},
        {title: "الأرقام", video: "videos/numbers.mp4", img: "images/numbers.png"}
    ],
    primary: [
        {title: "القراءة", video: "videos/reading.mp4", img: "images/reading.png"},
        {title: "الجمع", video: "videos/add.mp4", img: "images/add.png"}
    ],
    middle: [
        {title: "الكسور", video: "videos/fractions.mp4", img: "images/fractions.png"}
    ],
    prep: [
        {title: "المعادلات", video: "videos/equations.mp4", img: "images/equations.png"}
    ]
};

/* حماية */
window.onload = function(){

    if(localStorage.getItem("fromLanding") !== "yes"){
        window.location.href =
        "https://progalkhatib-debug.github.io/al-khatib-academy-pro/landing.html";
        return;
    }

    xp = parseInt(localStorage.getItem("xp") || 0);
    lessons = parseInt(localStorage.getItem("lessons") || 0);
    user = localStorage.getItem("user") || "";

    if(user){
        document.getElementById("welcome").innerText = "👋 مرحبًا " + user;
    }

    update();
    checkRewards();
    renderLevels();
}

/* عرض المراحل */
function renderLevels(){

    let container = document.getElementById("levelsContainer");

    container.innerHTML = `
    <div class="level" onclick="showLessons('kg')">👶 رياض الأطفال</div>
    <div class="level ${xp<50?'locked':''}" onclick="showLessons('primary')">🔤 المرحلة الابتدائية</div>
    <div class="level ${xp<100?'locked':''}" onclick="showLessons('middle')">📘 المرحلة المتوسطة</div>
    <div class="level ${xp<150?'locked':''}" onclick="showLessons('prep')">🎓 المرحلة الثانوية</div>
    `;
}

/* عرض الدروس */
function showLessons(level){

    let container = document.getElementById("levelsContainer");
    let list = lessonsData[level];

    let html = `<h3>📖 اختر الدرس</h3>`;

    list.forEach((lesson, index) => {
        html += `
        <div class="level" onclick="playLesson('${level}', ${index})">
        ▶ ${lesson.title} ⭐ <span class="badge">XP +25</span>
        </div>`;
    });

    html += `<button class="btn" onclick="renderLevels()">⬅ رجوع</button>`;

    container.innerHTML = html;
}

/* تشغيل */
function playLesson(level, index){

    let lesson = lessonsData[level][index];

    document.getElementById("lessonTitle").innerText = lesson.title;
    document.getElementById("videoPlayer").src = lesson.video;
    document.getElementById("lessonImage").src = lesson.img;

    document.getElementById("stars").innerHTML = "";

    document.getElementById("home").classList.remove("active");
    document.getElementById("lesson").classList.add("active");
}

/* إكمال */
function completeLesson(){

    xp += 25;
    lessons += 1;

    localStorage.setItem("xp", xp);
    localStorage.setItem("lessons", lessons);

    document.getElementById("successSound").play();

    // ⭐ عرض النجوم
    document.getElementById("stars").innerHTML = "⭐⭐⭐ ممتاز!";

    update();
    checkRewards();
    renderLevels();

    alert("🎉 رائع!");
}

/* باقي الكود كما هو بدون حذف */
function update(){
    document.getElementById("info").innerText =
    "🔥 XP: " + xp + " | 🎓 Level: " + Math.floor(xp/50 + 1);

    document.getElementById("bar").style.width = Math.min(xp,100) + "%";
}

function checkRewards(){
    if(lessons >= 2){
        document.getElementById("rewardBtn").style.display = "block";
    }
    if(lessons >= 4){
        document.getElementById("certificateBtn").style.display = "block";
    }
}

function openReward(){
    window.location.href =
    "https://singingfiles.com/show.php?l=0&u=2514927&id=74637";
}

function downloadCertificate(){

    let name = user || "طالب";

    let text = `
    شهادة إتمام
    ---------------------
    نهنئ ${name}
    لإكماله الدروس بنجاح 🎓
    `;

    let blob = new Blob([text], {type: "text/plain"});
    let link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = "certificate.txt";
    link.click();
}

function back(){
    document.getElementById("lesson").classList.remove("active");
    document.getElementById("home").classList.add("active");
}

</script>

</body>
</html>
