<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>📚 منصة التعليم الذكية للأطفال</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#eef2ff,#f5f7fb);
    text-align:center;
    padding:30px;
}

.box{
    max-width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.btn{
    padding:16px 28px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}

.mainBtn{
    background:#ff5722;
    color:white;
}

.secBtn{
    background:#28a745;
    color:white;
    text-decoration:none;
    display:inline-block;
}

.timer{
    font-size:20px;
    color:#ff5722;
    font-weight:bold;
    margin:10px 0;
}

.notify{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#333;
    color:#fff;
    padding:10px 15px;
    border-radius:10px;
    font-size:13px;
    display:none;
}
</style>
</head>

<body>

<div class="box">

<h1>📚 منصة التعليم الذكية للأطفال</h1>

<p>🎮 تعلم بطريقة الألعاب + فيديوهات + مستويات + شارات</p>

<h3>⚡ أكثر من 10,000 طفل بدأوا التعلم</h3>

<div class="timer">
⏳ متبقي: <span id="time">10</span> ثانية
</div>

<p style="color:#ff5722;font-weight:bold;">
🚀 ابدأ الآن مجانًا
</p>

<!-- زر أساسي -->
<button id="startBtn" onclick="startLearning()" class="btn mainBtn">
🎁 ابدأ الرحلة التعليمية
</button>

<br>

<!-- دخول مباشر -->
<a href="https://progalkhatib-debug.github.io/al-khatib-academy-pro/index.html"
onclick="setFlag()"
class="btn secBtn">
🚀 دخول مباشر للمنصة
</a>

<!-- 🔥 إضافة جديدة بدون حذف أي شيء -->
<br>

<a href="prelander.html" class="btn secBtn">
🎁 احصل على مكافأة الآن
</a>

<p id="status" style="margin-top:15px;color:#666;"></p>

</div>

<!-- إشعار -->
<div id="notify" class="notify">
🔥 مستخدم جديد بدأ التعلم الآن
</div>

<script>

let clicked = false;
let t = 10;

/* ⏳ عداد */
let timer = setInterval(()=>{
    t--;
    document.getElementById("time").innerText = t;

    if(t <= 0){
        clearInterval(timer);
    }
},1000);

/* 🔥 إشعارات وهمية */
setInterval(()=>{
    let n = document.getElementById("notify");
    n.style.display = "block";

    setTimeout(()=>{
        n.style.display = "none";
    },2000);
},5000);

/* تثبيت الدخول */
function setFlag(){
    localStorage.setItem("fromLanding","yes");
}

/* بدء التجربة */
function startLearning(){

    if(clicked) return;
    clicked = true;

    setFlag();

    let btn = document.getElementById("startBtn");
    btn.innerText = "⏳ جاري الدخول...";
    btn.style.opacity = "0.7";
    btn.disabled = true;

    document.getElementById("status").innerText =
    "🎯 جاري تجهيز التجربة التعليمية...";

    setTimeout(()=>{
        window.location.href =
"https://progalkhatib-debug.github.io/al-khatib-academy-pro/index.html";
    },1500);
}

/* تأكيد الدخول دائمًا */
window.onload = function(){
    setFlag();
}

</script>

</body>
</html>
