<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>📊 Dashboard</title>

<style>
body{
    font-family:Arial;
    background:#f5f7fb;
    text-align:center;
    padding:30px;
}

.box{
    max-width:400px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card{
    background:#eef6ff;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="box">

<h2>📊 Dashboard مباشر</h2>

<div class="card">📍 Landing: <span id="l">0</span></div>
<div class="card">🚀 Prelander: <span id="p">0</span></div>
<div class="card">⚡ Direct: <span id="d">0</span></div>

</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbzrGOrO1rxU5S-HmSU2YkkQ1skumK4REEnDgcTKXyxLXFPG5p_yWViP-_tudebMGchJ/exec?action=stats";

async function loadStats(){

    let res = await fetch(url);
    let data = await res.json();

    document.getElementById("l").innerText = data.landing;
    document.getElementById("p").innerText = data.prelander;
    document.getElementById("d").innerText = data.direct;
}

loadStats();
setInterval(loadStats, 5000);

</script>

</body>
</html>
