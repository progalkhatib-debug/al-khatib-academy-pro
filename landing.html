<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Landing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family:Arial;
    direction:rtl;
    margin:0;
    background:linear-gradient(135deg,#eef2ff,#f5f7fb);
    text-align:center;
    padding:30px;
}

.box{
    max-width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

button,a{
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h1>📚 منصة التعليم الذكية للأطفال</h1>

<p>🎮 تعلم بطريقة الألعاب + فيديوهات + مستويات</p>

<h3>⚡ أكثر من 10,000 طفل بدأوا التعلم</h3>

<p style="color:#ff5722;font-weight:bold;">ابدأ الآن مجانًا</p>

<button onclick="start()" style="padding:18px 30px;background:#ff5722;color:white;border:none;border-radius:12px;font-size:18px;">
🎁 ابدأ الرحلة التعليمية
</button>

<br><br>

<a href="https://progalkhatib-debug.github.io/al-khatib-academy-pro/"
onclick="setFlag()"
style="display:inline-block;background:#28a745;color:white;padding:14px 20px;border-radius:10px;text-decoration:none;">
🚀 دخول مباشر للمنصة
</a>

<p id="status"></p>

</div>

<script>

function setFlag(){
    localStorage.setItem("fromLanding","yes");
}

function start(){
    document.getElementById("status").innerText = "جاري التحضير...";

    localStorage.setItem("fromLanding","yes"); // 🔥 أهم سطر

    setTimeout(()=>{
        window.location.href = "https://progalkhatib-debug.github.io/al-khatib-academy-pro/";
    },1200);
}

</script>

</body>
</html>
