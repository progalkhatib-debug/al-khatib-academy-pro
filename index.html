<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Learning PRO</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#eef3fb;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#3f51b5,#7b2ff7);
    color:white;
    text-align:center;
    padding:18px;
    font-size:18px;
}

/* CONTAINER */
.container{
    max-width:520px;
    margin:auto;
    padding:15px;
}

/* CARD */
.card{
    background:white;
    padding:15px;
    margin:12px 0;
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

/* BUTTON */
.btn{
    background:#28a745;
    color:white;
    padding:12px;
    border:none;
    border-radius:10px;
    width:100%;
    margin-top:10px;
    font-size:15px;
    cursor:pointer;
}

/* LEVEL BOX */
.level{
    background:white;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
}

/* BADGES */
.badge{
    background:#ff5722;
    color:white;
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
}

/* PROGRESS */
.progress{
    background:#ddd;
    height:12px;
    border-radius:20px;
    overflow:hidden;
}
.bar{
    height:12px;
    width:0%;
    background:linear-gradient(90deg,#00c853,#64dd17);
}

/* PAGES */
.page{display:none;}
.active{display:block;}

/* small badge */
.smallBadge{
    display:inline-block;
    background:#673ab7;
    color:white;
    padding:5px 10px;
    border-radius:12px;
    margin:3px;
    font-size:12px;
}

/* animation */
.pop{
    animation:pop 0.3s ease;
}
@keyframes pop{
    0%{transform:scale(0.8);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="header">
📚 Kids Learning PRO - تعلم بطريقة الألعاب 🎮
</div>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">

<div class="card">
<h3>👋 مرحبًا " + name + "</h3>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<p id="score">النقاط: 0</p>
</div>

<div class="card">
<h3>🏆 شاراتك</h3>
<div id="badges"></div>
</div>

<div class="card">

<div class="level" onclick="openLesson('kg')">
👶 الحضانة <span class="badge">Beginner</span>
</div>

<div class="level" onclick="openLesson('primary')">
📘 ابتدائي <span class="badge">Medium</span>
</div>

<div class="level" onclick="openLesson('prep')">
📗 إعدادي <span class="badge">Advanced</span>
</div>

</div>

</div>

<!-- LESSON PAGE -->
<div id="lesson" class="page">

<div class="card">

<h3 id="title"></h3>

<iframe id="video" width="100%" height="220" style="border-radius:12px;"></iframe>

<p>📘 أكمل الدرس لتحصل على نقاط</p>

<button class="btn" onclick="complete()">
✔ إنهاء الدرس
</button>

<button class="btn" style="background:#555" onclick="back()">
⬅ رجوع
</button>

</div>

</div>

</div>

<script>

let score = 0;
let current = "";

/* load */
window.onload = function(){
    let s = localStorage.getItem("score");
    let b = JSON.parse(localStorage.getItem("badges") || "[]");

    if(s) score = parseInt(s);

    update();

    b.forEach(addBadge);
}

/* open lesson (page system) */
function openLesson(id){

    document.getElementById("home").classList.remove("active");
    document.getElementById("lesson").classList.add("active");

    current = id;

    if(id === "kg"){
        set("الحضانة - الحروف", "https://www.youtube.com/embed/tgbNymZ7vqY");
    }

    if(id === "primary"){
        set("الابتدائي - الأرقام", "https://www.youtube.com/embed/5MgBikgcWnY");
    }

    if(id === "prep"){
        set("الإعدادي - الإنجليزية", "https://www.youtube.com/embed/OPf0YbXqDm0");
    }
}

function set(title, video){
    document.getElementById("title").innerText = title;
    document.getElementById("video").src = video;
}

/* complete lesson */
function complete(){

    score += 25;

    let badge = "";

    if(score >= 25) badge = "🔰 Starter";
    if(score >= 75) badge = "⭐ Learner";
    if(score >= 150) badge = "🏆 Champion";
    if(score >= 250) badge = "👑 Master";

    save(badge);
    update();
}

/* save */
function save(badge){

    localStorage.setItem("score", score);

    if(badge){
        let arr = JSON.parse(localStorage.getItem("badges") || "[]");

        if(!arr.includes(badge)){
            arr.push(badge);
            localStorage.setItem("badges", JSON.stringify(arr));
            addBadge(badge);
        }
    }
}

/* UI */
function update(){
    document.getElementById("score").innerText = "النقاط: " + score;

    let percent = Math.min(score, 100);
    document.getElementById("bar").style.width = percent + "%";
}

/* badges */
function addBadge(text){
    let div = document.createElement("div");
    div.className = "smallBadge pop";
    div.innerText = text;
    document.getElementById("badges").appendChild(div);
}

/* back */
function back(){
    document.getElementById("lesson").classList.remove("active");
    document.getElementById("home").classList.add("active");
}

</script>

</body>
</html>
