<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <title>منصة تعليم الأطفال | تعلم الحروف والأرقام بطريقة ممتعة</title>

<meta name="description" content="منصة تعليمية للأطفال من الحضانة حتى الإعدادي. دروس تفاعلية + فيديوهات + ألعاب تعليمية ونظام نقاط لتحفيز التعلم.">

<meta name="keywords" content="تعليم الأطفال, تعلم الحروف, تعليم الأرقام, تعليم مجاني, منصة تعليمية, دروس للأطفال, تعليم تفاعلي">

<meta name="author" content="Al Khatib Academy Pro">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="منصة تعليم الأطفال التفاعلية">
<meta property="og:description" content="تعلم الحروف والأرقام بطريقة ممتعة مع نظام نقاط وشارات للأطفال">
<meta property="og:image" content="https://i.imgur.com/your-image.jpg">
<meta property="og:url" content="https://progalkhatib-debug.github.io/al-khatib-academy-pro/">
<meta property="og:type" content="website">
<meta charset="UTF-8">

<title>Kids Learning PRO</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#eef3fb;
}

.header{
    background:linear-gradient(135deg,#3f51b5,#7b2ff7);
    color:white;
    text-align:center;
    padding:18px;
    font-size:18px;
}

.container{
    max-width:520px;
    margin:auto;
    padding:15px;
}

.card{
    background:white;
    padding:15px;
    margin:12px 0;
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.btn{
    background:#28a745;
    color:white;
    padding:12px;
    border:none;
    border-radius:10px;
    width:100%;
    margin-top:10px;
    font-size:15px;
    cursor:pointer;
}

.level{
    background:white;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
}

.badge{
    background:#ff5722;
    color:white;
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
}

.progress{
    background:#ddd;
    height:12px;
    border-radius:20px;
    overflow:hidden;
}

.bar{
    height:12px;
    width:0%;
    background:linear-gradient(90deg,#00c853,#64dd17);
}

.page{display:none;}
.active{display:block;}

.smallBadge{
    display:inline-block;
    background:#673ab7;
    color:white;
    padding:5px 10px;
    border-radius:12px;
    margin:3px;
    font-size:12px;
}

.pop{animation:pop 0.3s ease;}

@keyframes pop{
    0%{transform:scale(0.8);}
    100%{transform:scale(1);}
}

/* تحسين بسيط للهوك (CTR) */
.cta{
    background:linear-gradient(135deg,#ff9800,#ff5722);
    color:white;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    text-align:center;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
📚 Kids Learning PRO - تعلم بطريقة الألعاب 🎮
</div>

<div class="container">

<!-- HOOK -->
<div class="cta">
🔥 تعلم + نقاط + شارات + مستويات 🎮 ابدأ الآن
</div>

<!-- LOGIN -->
<div class="card" id="loginBox">
    <h3>👤 أدخل اسمك للبدء</h3>
    <input id="usernameInput" placeholder="اكتب اسمك هنا"
    style="padding:10px;width:90%;border-radius:8px;border:1px solid #ccc;">
    <button class="btn" onclick="loginUser()">دخول</button>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="card">
<h3 id="welcome">👋 مرحبًا</h3>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<p id="score">النقاط: 0</p>
</div>

<div class="card">
<h3>🏆 شاراتك</h3>
<div id="badges"></div>
</div>

<div class="card">

<div class="level" onclick="openLesson('kg')">
👶 الحضانة <span class="badge">Beginner</span>
</div>

<div class="level" onclick="openLesson('primary')">
📘 ابتدائي <span class="badge">Medium</span>
</div>

<div class="level" onclick="openLesson('prep')">
📗 إعدادي <span class="badge">Advanced</span>
</div>

</div>

</div>

<!-- LESSON PAGE -->
<div id="lesson" class="page">

<div class="card">

<h3 id="title"></h3>

<iframe id="video" width="100%" height="220" style="border-radius:12px;" allowfullscreen></iframe>

<p>📘 أكمل الدرس لتحصل على نقاط</p>

<button class="btn" onclick="complete()">✔ إنهاء الدرس</button>

<button class="btn" style="background:#555" onclick="back()">⬅ رجوع</button>

</div>

</div>

</div>

<script>

let score = 0;
let current = "";
let user = "";

/* تسجيل الدخول */
function loginUser(){
    let name = document.getElementById("usernameInput").value;

    if(!name || name.length < 2){
        alert("اكتب اسم صحيح");
        return;
    }

    user = name;
    localStorage.setItem("user", user);

    document.getElementById("welcome").innerText = "👋 مرحبًا " + user;
    document.getElementById("loginBox").style.display = "none";
}

/* load */
window.onload = function(){

    let s = localStorage.getItem("score");
    let u = localStorage.getItem("user");

    if(s) score = parseInt(s);

    if(u){
        user = u;
        document.getElementById("welcome").innerText = "👋 مرحبًا " + user;
        document.getElementById("loginBox").style.display = "none";
    }

    update();

    let b = JSON.parse(localStorage.getItem("badges") || "[]");
    b.forEach(addBadge);
}

/* open lesson */
function openLesson(id){

    document.getElementById("home").classList.remove("active");
    document.getElementById("lesson").classList.add("active");

    current = id;

    if(id === "kg"){
        set("الحضانة - الحروف", "https://www.youtube.com/embed/tgbNymZ7vqY");
    }

    if(id === "primary"){
        set("الابتدائي - الأرقام", "https://www.youtube.com/embed/5MgBikgcWnY");
    }

    if(id === "prep"){
        set("الإعدادي - الإنجليزية", "https://www.youtube.com/embed/OPf0YbXqDm0");
    }
}

function set(title, video){
    document.getElementById("title").innerText = title;
    document.getElementById("video").src = video;
}

/* complete */
function complete(){

    score += 25;
    localStorage.setItem("score", score);

    update();

    if(score >= 25) saveBadge("🔰 Starter");
    if(score >= 75) saveBadge("⭐ Learner");
    if(score >= 150) saveBadge("🏆 Champion");
}

/* save badge */
function saveBadge(badge){

    let arr = JSON.parse(localStorage.getItem("badges") || "[]");

    if(!arr.includes(badge)){
        arr.push(badge);
        localStorage.setItem("badges", JSON.stringify(arr));
        addBadge(badge);
    }
}

/* UI */
function update(){

    document.getElementById("score").innerText = "النقاط: " + score;

    let percent = Math.min(score, 100);
    document.getElementById("bar").style.width = percent + "%";
}

/* badge */
function addBadge(text){

    let div = document.createElement("div");
    div.className = "smallBadge pop";
    div.innerText = text;

    document.getElementById("badges").appendChild(div);
}

/* back FIXED */
function back(){
    document.getElementById("lesson").classList.remove("active");
    document.getElementById("home").classList.add("active");
}

</script>

</body>
</html>
