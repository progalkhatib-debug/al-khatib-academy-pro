<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>📊 Dashboard Realtime</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:30px;
}

.box{
    max-width:500px;
    margin:auto;
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.card{
    background:#334155;
    padding:15px;
    margin:10px 0;
    border-radius:12px;
    font-size:18px;
}

.big{
    font-size:26px;
    font-weight:bold;
    color:#00ff99;
}

.status{
    margin-top:10px;
    font-size:12px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="box">

<h2>📊 Dashboard Realtime</h2>

<div class="card">📍 Landing: <div id="l" class="big">0</div></div>
<div class="card">🚀 Prelander: <div id="p" class="big">0</div></div>
<div class="card">⚡ Direct: <div id="d" class="big">0</div></div>
<div class="card">📊 Total: <div id="t" class="big">0</div></div>

<div class="status" id="status">⏳ جاري التحديث...</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzrGOrO1rxU5S-HmSU2YkkQ1skumK4REEnDgcTKXyxLXFPG5p_yWViP-_tudebMGchJ/exec?action=stats";

async function load(){

    try{
        let res = await fetch(API);
        let data = await res.json();

        document.getElementById("l").innerText = data.landing;
        document.getElementById("p").innerText = data.prelander;
        document.getElementById("d").innerText = data.direct;
        document.getElementById("t").innerText = data.total;

        document.getElementById("status").innerText = "🟢 Live";
    }
    catch(e){
        document.getElementById("status").innerText = "🔴 Error loading data";
    }
}

// أول تحميل
load();

// تحديث كل 5 ثواني
setInterval(load, 5000);

</script>

</body>
</html>
